web:
  url: "https://todomvc.com/examples/react/dist/"
  viewportWidth: 1280
  viewportHeight: 960

tasks:
  - name: "Create a todo item"
    flow:
      - aiInput: 'hello world'
        locate: 'the input field with placeholder "What needs to be done?"'
      - aiKeyboardPress: 'Enter'
        locate: 'the input field with placeholder "What needs to be done?"'
      - aiWaitFor: 'the todo item "hello world" appears in the list'

  - name: "Complete the todo item"
    flow:
      - aiTap: 'the checkbox next to "hello world" todo item'
      - aiWaitFor: 'the todo item is marked as completed with strikethrough text'

  - name: "Delete the todo item"
    flow:
      - aiTap: 'the delete button (X) on the right side of the "hello world" todo item'
      - aiWaitFor: 'the todo item is removed from the list'