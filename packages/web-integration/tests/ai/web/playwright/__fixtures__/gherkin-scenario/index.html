<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gherkin Todo Lab</title>
    <style>
      body {
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        margin: 0;
        background: #f7f8fb;
        color: #20242c;
      }

      main {
        max-width: 640px;
        margin: 48px auto;
        padding: 0 24px;
      }

      h1 {
        font-size: 28px;
        margin: 0 0 20px;
      }

      .task-form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
      }

      input,
      button {
        border-radius: 6px;
        font-size: 16px;
      }

      input {
        border: 1px solid #b9c0cf;
        padding: 12px 14px;
      }

      button {
        border: 0;
        background: #1769e0;
        color: white;
        cursor: pointer;
        font-weight: 650;
        padding: 0 18px;
      }

      ul {
        list-style: none;
        margin: 24px 0 12px;
        padding: 0;
      }

      li {
        align-items: center;
        background: white;
        border: 1px solid #dde2ec;
        border-radius: 6px;
        display: flex;
        gap: 10px;
        margin-bottom: 8px;
        padding: 12px 14px;
      }

      #status {
        color: #586174;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Gherkin Todo Lab</h1>
      <form class="task-form" id="task-form">
        <label for="task-input" hidden>Task name</label>
        <input
          id="task-input"
          name="task"
          autocomplete="off"
          placeholder="Task name"
        />
        <button id="add-task" type="submit">Add task</button>
      </form>
      <ul id="task-list" aria-label="Task list"></ul>
      <p id="status">No tasks yet</p>
    </main>

    <script>
      const form = document.querySelector('#task-form');
      const input = document.querySelector('#task-input');
      const list = document.querySelector('#task-list');
      const status = document.querySelector('#status');

      function updateStatus() {
        const count = list.children.length;
        status.textContent =
          count === 0 ? 'No tasks yet' : `${count} task${count > 1 ? 's' : ''}`;
      }

      form.addEventListener('submit', (event) => {
        event.preventDefault();

        const value = input.value.trim();
        if (!value) {
          return;
        }

        const item = document.createElement('li');
        item.textContent = value;
        list.appendChild(item);
        input.value = '';
        updateStatus();
      });
    </script>
  </body>
</html>
