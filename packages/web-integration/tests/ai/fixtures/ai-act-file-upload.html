<!DOCTYPE html>
<html>
<head>
  <title>AI Act File Upload</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 32px;
    }

    #upload-button {
      background: #1264a3;
      border: 0;
      color: #fff;
      cursor: pointer;
      padding: 10px 16px;
    }

    #selected-file-name {
      margin-top: 16px;
    }

    #uploaded-file-history {
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>AI Act File Upload</h1>
  <input id="file-input" type="file" style="display: none;">
  <button id="upload-button" type="button">Upload document</button>
  <div id="selected-file-name">No file selected</div>
  <ol id="uploaded-file-history"></ol>

  <script>
    const fileInput = document.getElementById('file-input');
    const uploadButton = document.getElementById('upload-button');
    const selectedFileName = document.getElementById('selected-file-name');
    const uploadedFileHistory = document.getElementById('uploaded-file-history');

    uploadButton.addEventListener('click', () => {
      fileInput.click();
    });

    fileInput.addEventListener('change', () => {
      selectedFileName.textContent = fileInput.files[0]
        ? fileInput.files[0].name
        : 'No file selected';
      if (fileInput.files[0]) {
        const historyItem = document.createElement('li');
        historyItem.textContent = fileInput.files[0].name;
        uploadedFileHistory.appendChild(historyItem);
      }
    });
  </script>
</body>
</html>
