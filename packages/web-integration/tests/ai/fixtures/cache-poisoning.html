<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cache Poisoning Repro</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 48px;
        color: #222;
      }
      h1 {
        font-size: 26px;
      }
      #submit {
        font-size: 20px;
        padding: 14px 28px;
        margin-top: 16px;
        background: #2563eb;
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }
      #result {
        margin-top: 28px;
        font-size: 24px;
        font-weight: 600;
        color: #16a34a;
        min-height: 32px;
      }
      /* A small, unobtrusive decoy element that exists and is clickable but
         does NOT complete the task. The poisoned cache xpath points here. */
      #decoy {
        position: fixed;
        bottom: 12px;
        right: 16px;
        font-size: 12px;
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <h1>Demo Order Page</h1>
    <p>Click the primary blue button to submit your order.</p>
    <button id="submit">Submit Order</button>
    <div id="result"></div>
    <a href="#" id="decoy">Help</a>
    <script>
      document.getElementById('submit').addEventListener('click', function () {
        document.getElementById('result').textContent =
          'Order submitted successfully';
      });
      // The decoy intentionally does nothing meaningful when clicked.
      document.getElementById('decoy').addEventListener('click', function (e) {
        e.preventDefault();
      });
    </script>
  </body>
</html>
