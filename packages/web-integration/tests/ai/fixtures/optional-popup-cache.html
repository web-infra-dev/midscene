<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Optional Popup Cache Fixture</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f7fb;
        color: #172033;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(520px, calc(100vw - 48px));
        padding: 32px;
        border: 1px solid #d8dee9;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 16px 40px rgba(23, 32, 51, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        line-height: 1.2;
      }

      p {
        margin: 0 0 24px;
        color: #4c596f;
        line-height: 1.5;
      }

      button {
        min-width: 180px;
        min-height: 48px;
        border: 0;
        border-radius: 6px;
        background: #1264d8;
        color: #ffffff;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        background: #0d55bb;
      }

      #status {
        margin-top: 20px;
        min-height: 24px;
        color: #0f6b3f;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Checkout</h1>
      <p>No promotion popup is visible on this visit.</p>
      <button id="complete-purchase" type="button">Complete purchase</button>
      <div id="status" aria-live="polite">Waiting for checkout action</div>
    </main>

    <script>
      document
        .getElementById('complete-purchase')
        .addEventListener('click', () => {
          document.getElementById('status').textContent = 'Order completed';
        });
    </script>
  </body>
</html>
