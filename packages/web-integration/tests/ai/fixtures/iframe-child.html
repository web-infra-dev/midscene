<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Iframe Child</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 10px; }
    .inner-btn { padding: 8px 16px; background: #4CAF50; color: white; border: none; cursor: pointer; }
    .inner-input { padding: 6px; border: 1px solid #ccc; width: 200px; }
  </style>
</head>
<body>
  <h2>Iframe Content</h2>
  <p id="inner-text">Hello from iframe</p>
  <button class="inner-btn" id="inner-btn">Submit Order</button>
  <input class="inner-input" id="inner-input" placeholder="Search in iframe" />
</body>
</html>
