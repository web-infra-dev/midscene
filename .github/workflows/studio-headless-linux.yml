name: Studio Headless Linux

on:
  pull_request:
    paths:
      - 'apps/studio/**'
      - '.github/workflows/studio-headless-linux.yml'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to checkout'
        required: false
        default: 'main'
        type: string

permissions:
  contents: read

jobs:
  studio-startup:
    runs-on: ubuntu-22.04
    env:
      CI: '1'

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.branch || github.ref }}

    - name: Setup pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 9.3.0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24.13.0'
        cache: 'pnpm'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          xvfb \
          libasound2 \
          libatk-bridge2.0-0 \
          libatk1.0-0 \
          libcups2 \
          libdrm2 \
          libgbm1 \
          libgtk-3-0 \
          libnotify4 \
          libnss3 \
          libpango-1.0-0 \
          libx11-xcb1 \
          libxcomposite1 \
          libxdamage1 \
          libxfixes3 \
          libxinerama1 \
          libxkbcommon-x11-0 \
          libxkbcommon0 \
          libxrandr2 \
          libxshmfence1 \
          libxss1 \
          libxtst6

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Build Studio
      run: npx nx build studio

    - name: Run Studio startup smoke test
      run: xvfb-run -a pnpm --dir apps/studio run test:smoke
      env:
        MIDSCENE_STUDIO_RUN_STARTUP_SMOKE: '1'
