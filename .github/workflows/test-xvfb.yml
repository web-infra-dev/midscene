name: Test Xvfb headless support

on:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/computer/**'
      - '.github/workflows/test-xvfb.yml'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to checkout'
        required: false
        default: 'main'
        type: string

permissions:
  contents: read

jobs:
  xvfb-unit-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.branch || github.ref }}

    - name: Setup pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 9.3.0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24.13.0'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile --ignore-scripts

    - name: Build project
      run: pnpm run build

    - name: Run Xvfb unit tests
      run: npx nx test @midscene/computer -- tests/unit-test/xvfb.test.ts

    - name: Run all computer unit tests
      run: npx nx test @midscene/computer

  xvfb-ai-todo-test:
    runs-on: ubuntu-22.04
    env:
      MIDSCENE_MODEL_API_KEY: ${{ secrets.MIDSCENE_MODEL_API_KEY }}
      MIDSCENE_MODEL_BASE_URL: ${{ vars.MIDSCENE_MODEL_BASE_URL }}
      MIDSCENE_MODEL_NAME: ${{ vars.MIDSCENE_MODEL_NAME }}
      MIDSCENE_MODEL_FAMILY: ${{ vars.MIDSCENE_MODEL_FAMILY }}
      MIDSCENE_MODEL_RETRY_COUNT: "2"
      MIDSCENE_MODEL_RETRY_INTERVAL: "60000"
      MIDSCENE_REPORT_QUIET: "true"
      CI: "1"

    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.branch || github.ref }}

    - name: Setup pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 9.3.0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24.13.0'
        cache: 'pnpm'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          xvfb \
          x11-xserver-utils \
          imagemagick \
          libxtst6 \
          libxinerama1 \
          libx11-6 \
          libxkbcommon-x11-0 \
          libpng16-16 \
          chromium-browser

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Build project
      run: pnpm run build

    - name: Verify system setup
      run: |
        echo "--- Xvfb ---"
        which Xvfb && echo "Xvfb: OK"
        echo "--- xrandr ---"
        which xrandr && echo "xrandr: OK"
        echo "--- import (imagemagick) ---"
        which import && echo "import: OK"
        echo "--- Browser ---"
        which chromium-browser || which google-chrome-stable || which chromium || echo "No browser found"
        echo "--- DISPLAY ---"
        echo "DISPLAY=${DISPLAY:-(not set)}"

    - name: Run AI todo test with Xvfb auto-detection
      run: |
        unset DISPLAY
        AI_TEST_TYPE=computer npx nx test @midscene/computer -- tests/ai/ai-auto-todo.test.ts
      timeout-minutes: 10
      id: test-ai
      continue-on-error: true

    - name: Upload test report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: xvfb-ai-test-report
        path: packages/computer/midscene_run/report
        if-no-files-found: ignore

    - name: Check test result
      if: steps.test-ai.outcome == 'failure'
      run: exit 1
