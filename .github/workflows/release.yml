name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version(major,minor,patch,preminor,prepatch)'
        required: true
        default: 'prepatch'
      branch:
        description: 'Release Branch(confirm release branch)'
        required: true
        default: 'main'

# Add permissions for creating releases
permissions:
  contents: write
  packages: write

jobs:
  release:
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.11.0]
    # Force rspack/miette onto the narratable diagnostic path. The graphical
    # handler in miette 7.6.0 panics on `terminal_size()` edge cases inside
    # GitHub Actions (no tty + stream multiplexing), which surfaces as a
    # "Formatting argument out of range" abort at
    # miette-7.6.0/src/handlers/graphical.rs:1159. Same commit can flake
    # pass/fail across reruns — setting these env vars makes the build
    # deterministic until rspack rolls a newer miette.
    env:
      COLUMNS: '120'
      TERM: dumb
      FORCE_COLOR: '0'
      NO_COLOR: '1'
    steps:
    - uses: actions/checkout@v2
      with:
        ref: ${{ github.event.inputs.branch }}
    - name: Pushing to the protected branch 'protected'
      uses: zhoushaw/push-protected@v2
      with:
        token: ${{ secrets.PUSH_TO_PROTECTED_BRANCH }}
        branch: ${{ github.event.inputs.branch }}
    - name: Setup pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 9.3.0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.11.0'
        cache: 'pnpm'

    - name: Cache Puppeteer
      uses: actions/cache@v4
      with:
        path: ~/.cache/puppeteer
        key: ${{ runner.os }}-puppeteer-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-puppeteer-

    - name: Install dependencies
      run: pnpm install --frozen-lockfile --ignore-scripts

    - name: Install Puppeteer browser
      run: cd packages/web-integration && npx puppeteer browsers install chrome

    - name: release
      run: node ./scripts/release.js --version=${{ github.event.inputs.version }}
      env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    
    - name: Get version from core package
      id: get_version
      run: |
        VERSION=$(cat packages/core/package.json | jq -r '.version')
        echo "version=v${VERSION}" >> $GITHUB_OUTPUT
        echo "Core package version: v${VERSION}"
        echo "## 🚀 Released v${VERSION}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Version**: \`v${VERSION}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Type**: \`${{ github.event.inputs.version }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch**: \`${{ github.event.inputs.branch }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **NPM**: [\`@midscene/core@${VERSION}\`](https://www.npmjs.com/package/@midscene/core/v/${VERSION})" >> $GITHUB_STEP_SUMMARY
      
    - name: Upload output
      uses: actions/upload-artifact@v4
      with:
        if-no-files-found: error
        name: chrome_extension
        path: ${{ github.workspace }}/apps/chrome-extension/extension_output
        
    - name: Upload Release Assets
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_version.outputs.version }}
        prerelease: ${{ contains(steps.get_version.outputs.version, 'beta') || contains(steps.get_version.outputs.version, 'alpha') || contains(steps.get_version.outputs.version, 'rc') }}
        files: |
          ${{ github.workspace }}/apps/chrome-extension/extension_output/**/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_chrome_web_store:
    needs: release
    if: ${{ needs.release.result == 'success' && !contains(needs.release.outputs.version, 'beta') && !contains(needs.release.outputs.version, 'alpha') && !contains(needs.release.outputs.version, 'rc') }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
      with:
        ref: ${{ github.event.inputs.branch }}
    - name: Download packaged Chrome extension artifact
      uses: actions/download-artifact@v4
      with:
        name: chrome_extension
        path: ${{ github.workspace }}/apps/chrome-extension/extension_output
    - name: Publish Chrome extension to Chrome Web Store
      id: publish_extension
      continue-on-error: true
      run: |
        bash ./scripts/publish-chrome-extension.sh \
          --zip-path "${{ github.workspace }}/apps/chrome-extension/extension_output/midscene-extension-${{ needs.release.outputs.version }}.zip"
      env:
        CHROME_WEB_STORE_PUBLISHER_ID: ${{ secrets.CHROME_WEB_STORE_PUBLISHER_ID }}
        CHROME_WEB_STORE_CLIENT_ID: ${{ secrets.CHROME_WEB_STORE_CLIENT_ID }}
        CHROME_WEB_STORE_CLIENT_SECRET: ${{ secrets.CHROME_WEB_STORE_CLIENT_SECRET }}
        CHROME_WEB_STORE_REFRESH_TOKEN: ${{ secrets.CHROME_WEB_STORE_REFRESH_TOKEN }}
    - name: Summarize manual fallback when Chrome Web Store publish fails
      if: ${{ steps.publish_extension.outcome == 'failure' }}
      run: |
        echo "## Chrome Web Store publish fallback" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Chrome Web Store publishing failed, but the GitHub Release and packaged extension artifact were created successfully." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Download the packaged extension zip from the GitHub Release page and upload it manually:" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "https://github.com/${{ github.repository }}/releases/tag/${{ needs.release.outputs.version }}" >> $GITHUB_STEP_SUMMARY

  package_studio:
    needs: release
    if: ${{ needs.release.result == 'success' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - os: ubuntu-latest
          platform: linux
          arch: x64
        - os: windows-latest
          platform: win32
          arch: x64
        - os: macos-15
          platform: darwin
          arch: arm64
    # Same miette-graphical workaround as the `release` job above.
    env:
      COLUMNS: '120'
      TERM: dumb
      FORCE_COLOR: '0'
      NO_COLOR: '1'
    steps:
    - uses: actions/checkout@v2
      with:
        ref: ${{ github.event.inputs.branch }}
    - name: Setup pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 9.3.0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.11.0'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile --ignore-scripts

    - name: Build Studio and Nx dependencies
      run: npx nx build studio

    - name: Package Midscene Studio
      run: pnpm --dir apps/studio run package:release -- --platform=${{ matrix.platform }} --arch=${{ matrix.arch }} --version=${{ needs.release.outputs.version }}

    - name: Upload packaged Studio artifact
      uses: actions/upload-artifact@v4
      with:
        if-no-files-found: error
        name: studio_${{ matrix.platform }}_${{ matrix.arch }}
        path: ${{ github.workspace }}/.release/studio/artifacts/*.zip

    - name: Upload Studio asset to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ needs.release.outputs.version }}
        prerelease: ${{ contains(needs.release.outputs.version, 'beta') || contains(needs.release.outputs.version, 'alpha') || contains(needs.release.outputs.version, 'rc') }}
        files: ${{ github.workspace }}/.release/studio/artifacts/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
