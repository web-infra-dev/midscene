name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version(major,minor,patch,preminor,prepatch)'
        required: true
        default: 'prepatch'
      branch:
        description: 'Release Branch(confirm release branch)'
        required: true
        default: 'main'

# Add permissions for creating releases
permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.13.0]
    steps:
    - uses: actions/checkout@v2
      with:
        ref: ${{ github.event.inputs.branch }}
    - name: Pushing to the protected branch 'protected'
      uses: zhoushaw/push-protected@v2
      with:
        token: ${{ secrets.PUSH_TO_PROTECTED_BRANCH }}
        branch: ${{ github.event.inputs.branch }}
    - name: Setup pnpm
      uses: pnpm/action-setup@v2
      with:
        version: 9.3.0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24.13.0'
        cache: 'pnpm'

    - name: Cache Puppeteer
      uses: actions/cache@v4
      with:
        path: ~/.cache/puppeteer
        key: ${{ runner.os }}-puppeteer-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-puppeteer-

    - name: Install dependencies
      run: pnpm install --frozen-lockfile --ignore-scripts

    - name: Install Puppeteer browser
      run: cd packages/web-integration && npx puppeteer browsers install chrome

    - name: Lock main branch
      if: github.event.inputs.branch == 'main'
      id: lock_branch
      run: |
        RULESET_ID=$(gh api repos/${{ github.repository }}/rulesets \
          --method POST \
          --input - <<'EOF' | jq '.id'
        {
          "name": "release-lock-main",
          "target": "branch",
          "enforcement": "active",
          "conditions": {
            "ref_name": {
              "include": ["refs/heads/main"],
              "exclude": []
            }
          },
          "rules": [
            { "type": "restrict_pushes", "parameters": { "restrict_pushes": true } }
          ],
          "bypass_actors": [
            {
              "actor_id": ${{ github.actor_id }},
              "actor_type": "User",
              "bypass_mode": "always"
            }
          ]
        }
        EOF
        )
        echo "ruleset_id=$RULESET_ID" >> $GITHUB_OUTPUT
        echo "Created ruleset $RULESET_ID to lock main branch"
      env:
        GH_TOKEN: ${{ secrets.PUSH_TO_PROTECTED_BRANCH }}

    - name: release
      run: node ./scripts/release.js --version=${{ github.event.inputs.version }}
      env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

    - name: Unlock main branch
      if: always() && steps.lock_branch.outputs.ruleset_id
      run: |
        gh api repos/${{ github.repository }}/rulesets/${{ steps.lock_branch.outputs.ruleset_id }} \
          --method DELETE
        echo "Deleted ruleset ${{ steps.lock_branch.outputs.ruleset_id }}"
      env:
        GH_TOKEN: ${{ secrets.PUSH_TO_PROTECTED_BRANCH }}
    
    - name: Get version from core package
      id: get_version
      run: |
        VERSION=$(cat packages/core/package.json | jq -r '.version')
        echo "version=v${VERSION}" >> $GITHUB_OUTPUT
        echo "Core package version: v${VERSION}"
        echo "## 🚀 Released v${VERSION}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Version**: \`v${VERSION}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Type**: \`${{ github.event.inputs.version }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch**: \`${{ github.event.inputs.branch }}\`" >> $GITHUB_STEP_SUMMARY
        echo "- **NPM**: [\`@midscene/core@${VERSION}\`](https://www.npmjs.com/package/@midscene/core/v/${VERSION})" >> $GITHUB_STEP_SUMMARY
      
    - name: Upload output
      uses: actions/upload-artifact@v4
      with:
        if-no-files-found: error
        name: chrome_extension
        path: ${{ github.workspace }}/apps/chrome-extension/extension_output
        
    - name: Upload Release Assets
      uses: softprops/action-gh-release@v2
      if: ${{ !contains(steps.get_version.outputs.version, 'beta') && !contains(steps.get_version.outputs.version, 'alpha') }}
      with:
        tag_name: ${{ steps.get_version.outputs.version }}
        files: |
          ${{ github.workspace }}/apps/chrome-extension/extension_output/**/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
