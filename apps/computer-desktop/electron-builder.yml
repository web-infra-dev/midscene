appId: ai.midscene.computer-playground
productName: Midscene Computer Playground
directories:
  output: dist
files:
  - main.cjs
  - package.json
  - node_modules/**/*
  - '!node_modules/@computer-use/libnut-linux{,/**}'
  - '!node_modules/@computer-use/libnut-win32{,/**}'
  - '!node_modules/@img/sharp-linux*{,/**}'
  - '!node_modules/@img/sharp-libvips-linux*{,/**}'
  - '!node_modules/@img/sharp-wasm32{,/**}'
  - '!node_modules/@img/sharp-win32*{,/**}'
extraResources:
  - from: ../../packages/computer-playground/static
    to: computer-playground-static
asarUnpack:
  - node_modules/@computer-use/libnut/**/*
  - node_modules/@computer-use/libnut-darwin/**/*
  - node_modules/@computer-use/node-mac-permissions/**/*
  - node_modules/node-mac-permissions/**/*
  - node_modules/screenshot-desktop/**/*
mac:
  target:
    - dmg
    - zip
  artifactName: midscene-computer-playground-${version}-${arch}-mac.${ext}
  category: public.app-category.developer-tools
  identity: null
  timestamp: none
dmg:
  artifactName: midscene-computer-playground-${version}-${arch}.${ext}
npmRebuild: false
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
