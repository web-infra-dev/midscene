target:
  serve: ./dist
  url: demo.html
tasks:
  - name: sidebar task list is rendered
    flow:
      - sleep: 3000
      - javascript: |
          (function () {
            const rows = document.querySelectorAll('.task-row');
            if (rows.length === 0) {
              throw new Error('Expected sidebar task rows to be rendered');
            }
            return rows.length;
          })()
        name: assert-sidebar-task-rows

  - name: click a task row to view details
    flow:
      - javascript: |
          (function () {
            const firstRow = document.querySelector('.task-row');
            if (!(firstRow instanceof HTMLElement)) {
              throw new Error('Expected first sidebar task row');
            }
            firstRow.click();
            return firstRow.getAttribute('data-task-id');
          })()
        name: click-first-task-row
      - sleep: 3000
      - javascript: |
          (function () {
            const selectedRow = document.querySelector('.task-row.selected');
            if (!selectedRow) {
              throw new Error('Expected a selected task row');
            }
            const detailSide = document.querySelector('.detail-side');
            if (!detailSide) {
              throw new Error('Expected detail side panel to be rendered');
            }
            const summaryTexts = Array.from(
              detailSide.querySelectorAll('.summary-text'),
            ).map((element) => element.textContent || '');
            if (!summaryTexts.includes('Param') || !summaryTexts.includes('Meta')) {
              throw new Error(
                'Expected detail side panel to show Param and Meta sections',
              );
            }
            return summaryTexts;
          })()
        name: assert-detail-side-sections

  - name: navigate between tasks
    flow:
      - javascript: |
          (function () {
            const rows = Array.from(document.querySelectorAll('.task-row'));
            if (rows.length < 2 || !(rows[1] instanceof HTMLElement)) {
              throw new Error('Expected at least two sidebar task rows');
            }
            rows[1].click();
            return rows[1].getAttribute('data-task-id');
          })()
        name: click-second-task-row
      - sleep: 2000
      - javascript: |
          (function () {
            const rows = Array.from(document.querySelectorAll('.task-row'));
            const selectedIndex = rows.findIndex((row) =>
              row.classList.contains('selected'),
            );
            if (selectedIndex !== 1) {
              throw new Error('Expected second task row to be selected');
            }
            if (!document.querySelector('.detail-side .summary-text')) {
              throw new Error('Expected detail side panel content');
            }
            return selectedIndex;
          })()
        name: assert-second-task-selected

  - name: toggle model call details
    flow:
      - javascript: |
          (function () {
            const checkbox = document.querySelector(
              '.token-usage-checkbox input[type="checkbox"]',
            );
            const label = document.querySelector('.token-usage-checkbox');
            if (!(checkbox instanceof HTMLInputElement) || !(label instanceof HTMLElement)) {
              throw new Error('Expected Model Call Details checkbox');
            }
            if (!checkbox.checked) {
              label.click();
            }
          })()
        name: enable-model-call-details
      - sleep: 1000
      - javascript: |
          (function () {
            const checkbox = document.querySelector(
              '.token-usage-checkbox input[type="checkbox"]',
            );
            if (!(checkbox instanceof HTMLInputElement) || !checkbox.checked) {
              throw new Error(
                'Model Call Details checkbox is not checked after enabling',
              );
            }
            const intentHeader = document.querySelector(
              '.tasks-table .table-header .header-cell.column-intent',
            );
            if (!intentHeader || intentHeader.textContent?.trim() !== 'Intent') {
              throw new Error(
                'Intent column header should be rendered when Model Call Details is enabled',
              );
            }
            return { proModeEnabled: true, intentHeaderRendered: true };
          })()
        name: assert-intent-column-visible
      - javascript: |
          (function () {
            const checkbox = document.querySelector(
              '.token-usage-checkbox input[type="checkbox"]',
            );
            const label = document.querySelector('.token-usage-checkbox');
            if (!(checkbox instanceof HTMLInputElement) || !(label instanceof HTMLElement)) {
              throw new Error('Expected Model Call Details checkbox');
            }
            if (checkbox.checked) {
              label.click();
            }
          })()
        name: disable-model-call-details
      - sleep: 1000
      - javascript: |
          (function () {
            const checkbox = document.querySelector(
              '.token-usage-checkbox input[type="checkbox"]',
            );
            if (!(checkbox instanceof HTMLInputElement) || checkbox.checked) {
              throw new Error(
                'Model Call Details checkbox should be unchecked after disabling',
              );
            }
            const intentHeader = document.querySelector(
              '.tasks-table .table-header .header-cell.column-intent',
            );
            if (intentHeader) {
              throw new Error(
                'Intent column header should be hidden when Model Call Details is disabled',
              );
            }
            return { proModeEnabled: false };
          })()
        name: assert-intent-column-hidden
