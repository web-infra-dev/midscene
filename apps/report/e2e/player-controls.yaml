target:
  serve: ./dist
  url: demo.html
tasks:
  - name: enter replay mode
    flow:
      - sleep: 2000
      - ai: Click the play icon button (Replay All) in the sidebar header area
      - sleep: 3000
      - aiAssert: A video player or animation player is visible with play/pause controls and a seek bar

  - name: play and pause controls
    flow:
      - ai: Click the play button on the player to start playback
      - sleep: 3000
      - aiAssert: The player is playing with a time indicator showing elapsed time greater than 0
      - ai: Click the pause button on the player
      - sleep: 1000
      - aiAssert: The player is paused

  - name: change playback speed
    flow:
      - ai: Click the settings gear icon on the player controls
      - sleep: 1000
      - ai: Click the "2x" playback speed option
      - sleep: 1000
      - aiAssert: The player settings show 2x speed is selected or active

  - name: toggle subtitle display
    flow:
      - ai: Click the settings gear icon on the player controls
      - sleep: 1000
      - ai: Click the "Subtitle" toggle option to enable subtitles
      - sleep: 2000
      - aiAssert: Subtitles or caption text is visible overlaid on the player area
