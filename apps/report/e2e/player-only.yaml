target:
  serve: ./dist
  url: demo.html?playerOnly=1
tasks:
  - name: player-only mode strips all report chrome
    flow:
      - sleep: 3000
      - javascript: |
          (function () {
            const container = document.querySelector('.page-container.player-only');
            if (!container) {
              throw new Error(
                'Expected .page-container.player-only when ?playerOnly=1 is set',
              );
            }
            const strippedSelectors = [
              '.page-nav',
              '.page-side',
              '.main-right-header',
              '.main-layout',
            ];
            const stillPresent = strippedSelectors.filter(
              (selector) => document.querySelector(selector) !== null,
            );
            if (stillPresent.length > 0) {
              throw new Error(
                'Player-only mode should hide report chrome, but found: ' +
                  stillPresent.join(', '),
              );
            }
            return { chromeStripped: true };
          })()
        name: assertChromeStripped

  - name: player-only mode renders just the player
    flow:
      - javascript: |
          (function () {
            const content = document.querySelector('.player-only-content');
            if (!content) {
              throw new Error('Expected .player-only-content to be rendered');
            }
            // Either the Player canvas mounted, or an Empty fallback is shown for
            // a task without a replay animation — never a silent blank screen.
            const hasPlayer =
              content.querySelector('.player-container') !== null;
            const hasFallback = content.querySelector('.ant-empty') !== null;
            if (!hasPlayer && !hasFallback) {
              throw new Error(
                'Player-only content is blank: neither a player nor a fallback',
              );
            }
            return { hasPlayer, hasFallback };
          })()
        name: assertPlayerRendered
