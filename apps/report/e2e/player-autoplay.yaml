target:
  serve: ./dist
  url: demo.html
tasks:
  - name: player autoplay starts automatically
    flow:
      - sleep: 1000
      - aiAssert: There is a video player area with a progress bar and a pause button (two vertical bars icon) visible on the control bar, indicating the player is currently playing

  - name: pause and resume works
    flow:
      - ai: Click the pause button on the player controls bar
      - sleep: 1000
      - aiAssert: There is a play button (triangle icon) visible, indicating the player is paused
