target:
  serve: ./dist
  url: demo.html
tasks:
  - name: timeline is visible
    flow:
      - sleep: 2000
      - aiAssert: A timeline or "Record" section is visible on the page with screenshot thumbnails or a time axis

  - name: collapse and expand timeline
    flow:
      - ai: Click the text "Record" with the "▼" arrow icon to collapse the timeline section
      - sleep: 2000
      - aiAssert: The "▼" arrow next to "Record" is now rotated sideways, and the timeline thumbnails below it are no longer visible
      - ai: Click the "Record" text with the arrow icon again to expand it back
      - sleep: 2000
      - aiAssert: The timeline section is expanded again showing screenshot thumbnails or time axis

  - name: click timeline screenshot to navigate
    flow:
      - ai: Click on a screenshot thumbnail in the timeline area
      - sleep: 2000
      - aiAssert: The sidebar highlights a task row and the detail panel shows information for the selected task
