target:
  serve: ./dist
  url: demo.html
tasks:
  # --- Basic loading ---
  - name: report loads and displays tasks
    flow:
      - sleep: 3000
      - javascript: |
          (function () {
            const rows = Array.from(
              document.querySelectorAll('.tasks-table .task-row'),
            );
            if (rows.length < 2) {
              throw new Error(
                'Expected at least two sidebar task rows, found ' + rows.length,
              );
            }
            const hasTimeColumn = rows.some((row) =>
              row.querySelector('.column-time')?.textContent?.trim(),
            );
            if (!hasTimeColumn) {
              throw new Error('Sidebar task rows do not show time costs');
            }
            return { taskRows: rows.length, hasTimeColumn };
          })()
        name: assertSidebarTaskList
      - javascript: |
          (function () {
            const headerText = document
              .querySelector('.main-right-header')
              ?.textContent?.replace(/\s+/g, ' ')
              .trim();
            if (!headerText?.includes('Record')) {
              throw new Error(
                'Record timeline header not found: ' + (headerText || ''),
              );
            }
            const timeline = document.querySelector('.timeline-wrapper');
            const canvas = document.querySelector(
              '.timeline-wrapper .timeline-canvas-wrapper canvas',
            );
            if (!timeline || !canvas) {
              throw new Error('Record timeline canvas is not rendered');
            }
            return { headerText, timelineRendered: true };
          })()
        name: assertRecordTimeline

  # --- Player area visible with controls ---
  - name: player area is visible with playback controls
    flow:
      - aiAssert: There is a video player area with a progress bar and playback time display

  # --- Settings popup ---
  - name: settings popup opens and shows options
    flow:
      - aiHover:
        locate:
          prompt: the central video player replay area, not the timeline thumbnails and not the left task sidebar
          deepLocate: true
      - sleep: 300
      - aiTap:
        locate:
          prompt: the visible settings button in the bottom playback control bar. It is the small hexagon or gear-shaped icon in the right-side control group, immediately left of the fullscreen icon and right of the progress bar.
          deepLocate: true
      - sleep: 1000
      - aiAssert: The player settings popup is open above the bottom-right control bar, showing options such as "Focus on cursor", "Subtitle", "Playback speed", and speed choices like "0.5x", "1x", "1.5x", or "2x".

  # --- Dark mode ---
  - name: toggle dark mode
    flow:
      - aiTap:
        locate:
          prompt: the "Toggle theme" button with a sun or moon icon in the top right header area
          deepLocate: true
      - sleep: 2000
      - aiAssert: The report UI (header, sidebar, and surrounding chrome) has a dark background color

  - name: toggle back to light mode
    flow:
      - aiTap:
        locate:
          prompt: the "Toggle theme" button with a sun or moon icon in the top right header area
          deepLocate: true
      - sleep: 2000
      - aiAssert: The report UI (header, sidebar, and surrounding chrome) has a light/white background color
