target:
  serve: ./dist
  url: demo.html
tasks:
  # --- Basic loading ---
  - name: report loads and displays tasks
    flow:
      - sleep: 3000
      - aiAssert: There is a sidebar on the left showing a task execution list with task names and time costs
      - aiAssert: There is a 'Record' timeline section with screenshot thumbnails

  # --- Player area visible with controls ---
  - name: player area is visible with playback controls
    flow:
      - aiAssert: There is a video player area with a progress bar and playback time display

  # --- Settings popup ---
  - name: settings popup opens and shows options
    flow:
      - ai: Click the settings gear icon on the player controls bar
      - sleep: 1000
      - aiAssert: A settings popup is visible showing playback speed options or toggle switches

  # --- Dark mode ---
  - name: toggle dark mode
    flow:
      - javascript: |
          (function () {
            const button = document.querySelector('[aria-label="Toggle theme"]');
            if (!(button instanceof HTMLElement)) {
              throw new Error('Toggle theme button not found');
            }
            if (document.documentElement.getAttribute('data-theme') !== 'dark') {
              button.click();
            }
          })()
        name: toggle-theme-to-dark
      - sleep: 1000
      - javascript: |
          (function () {
            const theme = document.documentElement.getAttribute('data-theme');
            if (theme !== 'dark') {
              throw new Error('Expected dark theme, got ' + theme);
            }
            return theme;
          })()
        name: assert-dark-theme

  - name: toggle back to light mode
    flow:
      - javascript: |
          (function () {
            const button = document.querySelector('[aria-label="Toggle theme"]');
            if (!(button instanceof HTMLElement)) {
              throw new Error('Toggle theme button not found');
            }
            if (document.documentElement.getAttribute('data-theme') !== 'light') {
              button.click();
            }
          })()
        name: toggle-theme-to-light
      - sleep: 1000
      - javascript: |
          (function () {
            const theme = document.documentElement.getAttribute('data-theme');
            if (theme !== 'light') {
              throw new Error('Expected light theme, got ' + theme);
            }
            return theme;
          })()
        name: assert-light-theme
