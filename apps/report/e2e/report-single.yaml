target:
  serve: ./dist
  url: demo.html
tasks:
  # --- Basic loading ---
  - name: report loads and displays tasks
    flow:
      - sleep: 3000
      - aiAssert: There is a sidebar on the left showing a task execution list with task names and time costs
      - aiAssert: There is a 'Record' timeline section with screenshot thumbnails

  # --- Player area visible with controls ---
  - name: player area is visible with playback controls
    flow:
      - aiAssert: There is a video player area with a progress bar and playback time display

  # --- Settings popup ---
  - name: settings popup opens and shows options
    flow:
      - ai: Move the mouse over the center of the video player replay area so the bottom playback control bar is visible.
      - sleep: 500
      - ai: Click the small settings button in the bottom playback control bar. It is the hexagon or gear-shaped icon in the right-side control group, immediately to the left of the fullscreen icon and to the right of the progress bar.
        deepLocate: true
      - sleep: 1000
      - aiAssert: The player settings popup is open above the bottom-right control bar, showing options such as "Focus on cursor", "Subtitle", "Playback speed", and speed choices like "0.5x", "1x", "1.5x", or "2x".

  # --- Dark mode ---
  - name: toggle dark mode
    flow:
      - ai: Click the theme toggle button (sun or moon icon) in the top right corner of the page
      - sleep: 1000
      - aiAssert: The page background is dark colored, indicating dark mode is active

  - name: toggle back to light mode
    flow:
      - ai: Click the theme toggle button (sun or moon icon) in the top right corner of the page
      - sleep: 1000
      - aiAssert: The page background is light or white colored, indicating light mode is active
