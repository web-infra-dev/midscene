target:
  serve: ./dist
  url: demo.html
tasks:
  # --- Basic loading ---
  - name: report loads and displays tasks
    flow:
      - sleep: 3000
      - aiAssert: There is a sidebar on the left showing a task execution list with task names and time costs
      - aiAssert: There is a 'Record' timeline section with screenshot thumbnails

  # --- Player area visible with controls ---
  - name: player area is visible with playback controls
    flow:
      - aiAssert: There is a video player area with a progress bar and playback time display

  # --- Settings popup ---
  - name: settings popup opens and shows options
    flow:
      - aiHover:
        locate:
          prompt: the central video player replay area, not the timeline thumbnails and not the left task sidebar
          deepLocate: true
      - sleep: 300
      - aiTap:
        locate:
          prompt: the visible settings button in the bottom playback control bar. It is the small hexagon or gear-shaped icon in the right-side control group, immediately left of the fullscreen icon and right of the progress bar.
          deepLocate: true
      - sleep: 1000
      - aiAssert: The player settings popup is open above the bottom-right control bar, showing options such as "Focus on cursor", "Subtitle", "Playback speed", and speed choices like "0.5x", "1x", "1.5x", or "2x".

  # --- Dark mode ---
  - name: toggle dark mode
    flow:
      - javascript: |
          (function () {
            const button = document.querySelector(
              'button[aria-label="Toggle theme"]',
            );
            if (!(button instanceof HTMLElement)) {
              throw new Error('Theme toggle button not found');
            }
            const currentTheme =
              document
                .querySelector('.page-container')
                ?.getAttribute('data-theme') ||
              document.documentElement.getAttribute('data-theme');
            if (currentTheme !== 'dark') {
              button.click();
            }
            return { previousTheme: currentTheme };
          })()
        name: toggleDarkMode
      - sleep: 1000
      - javascript: |
          (function () {
            const container = document.querySelector('.page-container');
            const side = document.querySelector('.page-side');
            if (!container || !side) {
              throw new Error('Report theme elements not found');
            }
            const theme = container.getAttribute('data-theme');
            const background = getComputedStyle(side).backgroundColor;
            const channels = background.match(/\d+/g)?.map(Number) || [];
            const average =
              channels.slice(0, 3).reduce((sum, value) => sum + value, 0) / 3;
            if (theme !== 'dark' || average > 80) {
              throw new Error(
                'Expected dark theme, got theme=' +
                  theme +
                  ', background=' +
                  background,
              );
            }
            return { theme, background };
          })()
        name: assertDarkMode

  - name: toggle back to light mode
    flow:
      - javascript: |
          (function () {
            const button = document.querySelector(
              'button[aria-label="Toggle theme"]',
            );
            if (!(button instanceof HTMLElement)) {
              throw new Error('Theme toggle button not found');
            }
            const currentTheme =
              document
                .querySelector('.page-container')
                ?.getAttribute('data-theme') ||
              document.documentElement.getAttribute('data-theme');
            if (currentTheme !== 'light') {
              button.click();
            }
            return { previousTheme: currentTheme };
          })()
        name: toggleLightMode
      - sleep: 1000
      - javascript: |
          (function () {
            const container = document.querySelector('.page-container');
            const side = document.querySelector('.page-side');
            if (!container || !side) {
              throw new Error('Report theme elements not found');
            }
            const theme = container.getAttribute('data-theme');
            const background = getComputedStyle(side).backgroundColor;
            const channels = background.match(/\d+/g)?.map(Number) || [];
            const average =
              channels.slice(0, 3).reduce((sum, value) => sum + value, 0) / 3;
            if (theme !== 'light' || average < 200) {
              throw new Error(
                'Expected light theme, got theme=' +
                  theme +
                  ', background=' +
                  background,
              );
            }
            return { theme, background };
          })()
        name: assertLightMode
