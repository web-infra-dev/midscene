target:
  serve: ./dist
  url: demo.html
tasks:
  # --- Basic loading ---
  - name: report loads and displays tasks
    flow:
      - sleep: 3000
      - aiAssert: There is a sidebar on the left showing a task execution list with task names and time costs
      - aiAssert: There is a 'Record' timeline section with screenshot thumbnails

  # --- Player area visible with controls ---
  - name: player area is visible with playback controls
    flow:
      - aiAssert: There is a video player area with a progress bar and playback time display

  # --- Settings popup ---
  - name: settings popup opens and shows options
    flow:
      - javascript: |
          (function () {
            const settingsButton = document.querySelector(
              '.player-custom-controls .status-icon',
            );
            if (!(settingsButton instanceof HTMLElement)) {
              throw new Error('Player settings button not found');
            }
            settingsButton.click();
            return { settingsClicked: true };
          })()
        name: openPlayerSettings
      - sleep: 1000
      - javascript: |
          (function () {
            const dropdown = document.querySelector('.player-settings-dropdown');
            if (!(dropdown instanceof HTMLElement)) {
              throw new Error('Player settings dropdown not found');
            }
            const text = dropdown.textContent.replace(/\s+/g, ' ').trim();
            const expectedTexts = [
              'Focus on cursor',
              'Subtitle',
              'Playback speed',
              '0.5x',
              '1x',
              '1.5x',
              '2x',
            ];
            const missingTexts = expectedTexts.filter(
              (expectedText) => !text.includes(expectedText),
            );
            if (missingTexts.length > 0) {
              throw new Error(
                'Player settings dropdown missing: ' + missingTexts.join(', '),
              );
            }
            return { settingsText: text };
          })()
        name: assertPlayerSettingsOptions

  # --- Dark mode ---
  - name: toggle dark mode
    flow:
      - ai: Click the theme toggle button (sun or moon icon) in the top right corner of the page
      - sleep: 1000
      - aiAssert: The page background is dark colored, indicating dark mode is active

  - name: toggle back to light mode
    flow:
      - ai: Click the theme toggle button (sun or moon icon) in the top right corner of the page
      - sleep: 1000
      - aiAssert: The page background is light or white colored, indicating light mode is active
