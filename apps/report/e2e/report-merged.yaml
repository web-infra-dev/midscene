target:
  serve: ./dist
  url: demo-merged.html
tasks:
  # --- Status display ---
  - name: status summary cards show correct counts
    flow:
      - sleep: 3000
      - aiAssert: There are test status summary cards showing Total, Passed, and Failed counts
      - aiAssert: The Total count is 2
      - aiAssert: The Passed count is 1
      - aiAssert: The Failed count is 1

  # --- Failed status indicator ---
  - name: merged report shows failed status indicator
    flow:
      - aiAssert: There is a red colored number or failure indicator visible on the page, showing that some tests failed

  # --- Case selector ---
  - name: case selector is visible
    flow:
      - aiAssert: Below the Total, Passed, and Failed summary cards in the left sidebar, there is a case selector control showing the current test case title and a small down arrow

  - name: switch between test cases
    flow:
      - ai: In the case selector control below the summary cards, open the popup and click the second visible test case option
      - sleep: 5000
      - aiAssert: The sidebar shows a task execution list

  - name: filter by status
    flow:
      - ai: In the case selector control below the summary cards, open the popup. In that popup, click the status filter dropdown and select 'Failed'
      - sleep: 2000
      - aiAssert: The status filter control now shows 'Failed'
      - aiAssert: In the expanded case selector popup below the filter controls, exactly 1 test case option is visible. Ignore the task execution rows behind the popup.
      - aiAssert: The single visible test case option in that popup shows a failed status indicator
