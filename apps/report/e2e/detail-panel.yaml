target:
  serve: ./dist
  url: demo.html
tasks:
  - name: view screenshots tab
    flow:
      - sleep: 2000
      - aiTap: the first task row in the left sidebar that has type "Planning" or "Insight" or "Locate"
      - sleep: 2000
      # Replay also contains screenshot imagery, so always click the tab instead
      # of asking the model to infer the current selected state from content.
      - aiTap:
          locate:
            prompt: the exact "Screenshots" text label, which is the middle option between Replay and JSON View in the switcher at the top of the center task detail area
            deepLocate: true
      - sleep: 1500
      - aiAssert: The Screenshots option in the center task detail switcher is selected with an active white background, and the view below it shows a "UI Context / captured at" caption above a screenshot image. The UI Context caption is expected content inside the Screenshots view, not a separate tab.

  - name: view JSON data tab
    flow:
      - ai: In the center task detail area, click the "JSON View" option in the Replay/Screenshots/JSON View switcher and wait until the content changes to the text data view
      - sleep: 1000
      - aiAssert: The center task detail area has the JSON View option selected and shows structured task details as text instead of screenshot images

  - name: inspect detail side sections
    flow:
      - ai: Click on the first Planning task row in the left sidebar
      - sleep: 1000
      - aiAssert: The right detail side panel shows collapsible section headers named Param and Output, and the Param section is expanded with task input data
      # Collapse both Param and the Output/Element section so the Meta section
      # (always rendered last) rises to the top of the panel with its heading
      # and first metadata rows fully on screen. This avoids depending on
      # scroll position: Meta is long, so any partial scroll leaves either the
      # heading or the type/status/start rows out of the viewport.
      - aiTap: Output section header in the right detail side panel
      - sleep: 500
      - aiAssert: The Output section is collapsed; the Output header is still visible but the output content under it is hidden
      - aiTap: Param section header in the right detail side panel
      - sleep: 1000
      - aiAssert: The Meta section is visible in the right detail side panel and shows metadata entries such as type, status, start, end, or total time; Param and Output are collapsed above it

  - name: open in playground button
    flow:
      - ai: Click on a task row in the sidebar that shows "Planning" type
      - sleep: 2000
      - aiAssert: There is a "Open in Playground" button visible on the page
