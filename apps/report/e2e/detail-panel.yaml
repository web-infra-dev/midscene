target:
  serve: ./dist
  url: demo.html
tasks:
  - name: view screenshots tab
    flow:
      - sleep: 3000
      # Click an aiAssert/Insight task so Screenshots is the default tab
      # (Planning tasks default to Replay; Insight tasks default to Screenshots)
      - aiTap:
          locate:
            prompt: A task row in the left sidebar table whose type column shows "Insight" or that is an assertion/aiAssert task. Click on it to select the task and show its details in the center panel.
            deepLocate: true
      - sleep: 3000
      # If the selected task happens to be Planning type (shows Replay),
      # explicitly switch to the Screenshots segmented button.
      - aiTap:
          locate:
            prompt: The pill-shaped "Screenshots" button in the segmented tab switcher at the very top of the center detail panel. It has a small camera icon to the left of the text "Screenshots". It is in the same row as "Replay" and "JSON View" buttons. If only "Screenshots" and "JSON View" are visible, it is the leftmost pill button.
            deepLocate: true
      - sleep: 2000
      - aiAssert: The center detail panel shows the Screenshots tab content. It displays at least one screenshot image. The top of the panel shows "Screenshots" as the active pill button (highlighted/selected).

  - name: view JSON data tab
    flow:
      - aiTap:
          locate:
            prompt: The pill-shaped "JSON View" button in the segmented tab switcher at the top of the center detail panel. It has a document/text file icon to the left of the text "JSON View". It is the rightmost pill button in the tab switcher.
            deepLocate: true
      - sleep: 2000
      - aiAssert: The center detail panel shows the JSON View tab content. The "JSON View" pill button at the top is highlighted/selected. The content area shows structured JSON data or key-value text, not screenshot images.

  - name: inspect detail side sections
    flow:
      - aiTap:
          locate:
            prompt: A task row in the left sidebar table that shows "Planning" type. Click on it to select and view its details.
            deepLocate: true
      - sleep: 1000
      - aiAssert: The right detail side panel shows collapsible section headers named Param and Output, and the Param section is expanded with task input data
      # Collapse both Param and the Output/Element section so the Meta section
      # (always rendered last) rises to the top of the panel with its heading
      # and first metadata rows fully on screen. This avoids depending on
      # scroll position: Meta is long, so any partial scroll leaves either the
      # heading or the type/status/start rows out of the viewport.
      - aiTap: Output section header in the right detail side panel
      - sleep: 500
      - aiAssert: The Output section is collapsed; the Output header is still visible but the output content under it is hidden
      - aiTap: Param section header in the right detail side panel
      - sleep: 1000
      - aiAssert: The Meta section is visible in the right detail side panel and shows metadata entries such as type, status, start, end, or total time; Param and Output are collapsed above it

  - name: open in playground button
    flow:
      - aiTap:
          locate:
            prompt: A task row in the left sidebar that shows "Planning" type. Click to select it.
            deepLocate: true
      - sleep: 2000
      - aiAssert: There is a "Open in Playground" button visible on the page
