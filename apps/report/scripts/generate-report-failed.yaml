# This YAML generates a report with a failed assertion for e2e testing.
# The intentional failure ensures the merged report contains both passed and failed cases.
web:
  url: https://www.saucedemo.com/

tasks:
  - name: login to sauce demo
    flow:
      - ai: type 'standard_user' in user name input, type 'secret_sauce' in password, click 'Login'

  - name: intentional failure for testing
    flow:
      - aiAssert: The page title says 'This is an intentionally wrong assertion for testing'
